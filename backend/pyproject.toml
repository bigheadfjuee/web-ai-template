[project]
name = "web-ai-template-backend"
version = "0.1.0"
description = "FastAPI backend scaffold for the web-ai-template."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "pydantic-settings>=2.5",
    "uvicorn[standard]>=0.30",
]

[dependency-groups]
dev = [
    "ruff>=0.7",
]

[tool.ruff]
line-length = 100
target-version = "py312"
