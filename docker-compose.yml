services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /auth/realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.0 200' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: SaPassword!2026
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; SQLCMD_TLS_ARGS=-C; if [ ! -x \"$$SQLCMD\" ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; SQLCMD_TLS_ARGS=; fi; \"$$SQLCMD\" -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" $$SQLCMD_TLS_ARGS -Q \"SELECT 1\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: SaPassword!2026
      MSSQL_APP_PASSWORD: AppPassword!2026
    depends_on:
      mssql:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        SQLCMD_TLS_ARGS=-C
        if [ ! -x "$$SQLCMD" ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; SQLCMD_TLS_ARGS=; fi
        "$$SQLCMD" -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" $$SQLCMD_TLS_ARGS -Q "IF DB_ID(N'appdb') IS NULL CREATE DATABASE [appdb]; IF SUSER_ID(N'appuser') IS NULL CREATE LOGIN [appuser] WITH PASSWORD=N'$$MSSQL_APP_PASSWORD';"
        "$$SQLCMD" -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" $$SQLCMD_TLS_ARGS -d appdb -Q "IF USER_ID(N'appuser') IS NULL CREATE USER [appuser] FOR LOGIN [appuser]; IF IS_ROLEMEMBER(N'db_owner', N'appuser') = 0 ALTER ROLE [db_owner] ADD MEMBER [appuser];"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "mssql+aioodbc://appuser:AppPassword%212026@mssql:1433/appdb?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      KEYCLOAK_JWKS_URI: http://keycloak:8080/auth/realms/app/protocol/openid-connect/certs
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  mssql_data:
